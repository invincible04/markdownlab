name: Bug report
description: Something in MarkdownLab is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search [existing issues](https://github.com/invincible04/markdownlab/issues?q=is%3Aissue) first — duplicates will be closed.

        If this is a **security** issue, do not file it here. See [SECURITY.md](https://github.com/invincible04/markdownlab/blob/main/SECURITY.md).

  - type: input
    id: url
    attributes:
      label: Where did this happen?
      description: URL of the live demo, or `localhost` if you cloned the repo.
      placeholder: "https://markdownlab.vercel.app/ — or — localhost:8000"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge
        - Arc / Brave / other Chromium
        - Mobile Safari (iOS)
        - Chrome Mobile (Android)
        - Other
    validations:
      required: true

  - type: input
    id: browser_version
    attributes:
      label: Browser version
      description: "Example: Chrome 127 on macOS 14.5"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please be specific. A reproduction on the live demo is ideal.
      placeholder: |
        1. Open https://markdownlab.vercel.app/
        2. Paste the sample markdown from the "Minimal markdown" field below
        3. Click "Export PDF"
        4. Observe the result
    validations:
      required: true

  - type: textarea
    id: markdown
    attributes:
      label: Minimal markdown that triggers the bug
      description: The smallest markdown snippet that reproduces the issue. Leave blank if not applicable.
      render: markdown

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include exact error messages from the browser console if any.
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: Open DevTools → Console. Paste any warnings or errors.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest version of `main` (or the live demo).
          required: true
        - label: This is not a security vulnerability (those go through [SECURITY.md](https://github.com/invincible04/markdownlab/blob/main/SECURITY.md)).
          required: true
