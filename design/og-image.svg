<?xml version="1.0" encoding="UTF-8"?>
<!-- 1200×630 social share card for MarkdownLab. Editable source; the
     site references the rasterized og-image.png at the repo root
     because every major social platform rejects SVG. See design/README.md
     for regeneration instructions. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0891b2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <g transform="translate(80, 80)">
    <rect width="96" height="96" rx="22" fill="url(#accent)"/>
    <path d="M15 69V27h10l12 18 12-18h10v42h-10V45l-12 18-12-18v24H15z" fill="white"/>
    <path d="M66 42h7v15h6l-9 12-9-12h6V42z" fill="white"/>
  </g>

  <text x="200" y="128" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="44" font-weight="700" fill="#e5e7eb" letter-spacing="-0.02em">MarkdownLab</text>
  <text x="200" y="164" font-family="Inter, -apple-system, sans-serif"
        font-size="20" font-weight="500" fill="#0891b2" letter-spacing="0.04em">FREE · OPEN SOURCE · RUNS IN YOUR BROWSER</text>

  <text x="80" y="300" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="#f9fafb" letter-spacing="-0.03em">Live Markdown Editor</text>
  <text x="80" y="385" font-family="Inter, -apple-system, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-0.03em">
    <tspan fill="url(#accent)">Mermaid</tspan><tspan fill="#f9fafb"> · </tspan><tspan fill="url(#accent)">LaTeX</tspan><tspan fill="#f9fafb"> · </tspan><tspan fill="url(#accent)">PDF export</tspan>
  </text>

  <g font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#d1d5db">
    <g transform="translate(80, 460)">
      <rect width="175" height="44" rx="22" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="20" y="29">GFM Markdown</text>
    </g>
    <g transform="translate(270, 460)">
      <rect width="195" height="44" rx="22" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="20" y="29">Mermaid diagrams</text>
    </g>
    <g transform="translate(480, 460)">
      <rect width="150" height="44" rx="22" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="20" y="29">KaTeX math</text>
    </g>
    <g transform="translate(645, 460)">
      <rect width="205" height="44" rx="22" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="20" y="29">Syntax highlighting</text>
    </g>
    <g transform="translate(865, 460)">
      <rect width="185" height="44" rx="22" fill="#1f2937" stroke="#374151" stroke-width="1"/>
      <text x="20" y="29">Offline · Private</text>
    </g>
  </g>

  <text x="80" y="580" font-family="'JetBrains Mono', Menlo, monospace"
        font-size="22" font-weight="500" fill="#6b7280">markdownlab.vercel.app</text>

  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.5">
    <path d="M 1080 180 L 1120 180 L 1120 220"/>
    <path d="M 1120 440 L 1120 480 L 1080 480"/>
  </g>
</svg>
