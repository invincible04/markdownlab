<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>MarkdownLab — Live Markdown, Mermaid & LaTeX Renderer</title>
  <meta name="description" content="MarkdownLab — a beautiful static markdown playground. Paste or drop a .md file and get instant rendering for GFM, syntax-highlighted code, Mermaid diagrams, and KaTeX math." />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- App styles -->
  <link rel="stylesheet" href="css/styles.css?v=2" />

  <!-- Typography: Inter for UI/body, JetBrains Mono for code -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" />

  <!-- KaTeX CSS (required for rendered math) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous" />

  <!-- highlight.js theme (swapped on theme toggle) -->
  <link rel="stylesheet" id="hljs-theme" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/atom-one-dark.min.css" />

  <!-- Favicon (inline SVG — MarkdownLab mark) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23059669'/><stop offset='1' stop-color='%230891b2'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><path d='M10 46V18h7l8 12 8-12h7v28h-7V30l-8 12-8-12v16H10z' fill='white'/><path d='M44 28h5v10h4l-6 8-6-8h4V28z' fill='white'/></svg>" />
</head>
<body>
  <!-- Top navigation bar -->
  <header class="topbar" role="banner">
    <div class="topbar__brand">
      <div class="topbar__logo" aria-hidden="true">
        <!-- MarkdownLab mark: the canonical M↓ glyph in our brand gradient -->
        <svg viewBox="0 0 64 64" width="32" height="32">
          <defs>
            <linearGradient id="logo-g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="var(--accent-a)"/>
              <stop offset="1" stop-color="var(--accent-b)"/>
            </linearGradient>
          </defs>
          <rect width="64" height="64" rx="14" fill="url(#logo-g)"/>
          <path d="M10 46V18h7l8 12 8-12h7v28h-7V30l-8 12-8-12v16H10z" fill="white" opacity="0.98"/>
          <path d="M44 28h5v10h4l-6 8-6-8h4V28z" fill="white" opacity="0.98"/>
        </svg>
      </div>
      <div class="topbar__title">
        <h1>MarkdownLab</h1>
        <p class="topbar__subtitle" id="file-indicator">Untitled.md · autosaved</p>
      </div>
    </div>

    <nav class="topbar__nav" aria-label="View modes">
      <div class="segmented" role="tablist" aria-label="Layout">
        <button class="segmented__item" data-view="editor" role="tab" aria-selected="false" title="Editor only (Ctrl/Cmd + 1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
          Editor
        </button>
        <button class="segmented__item is-active" data-view="split" role="tab" aria-selected="true" title="Split view (Ctrl/Cmd + 2)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4v16"/></svg>
          Split
        </button>
        <button class="segmented__item" data-view="preview" role="tab" aria-selected="false" title="Preview only (Ctrl/Cmd + 3)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </button>
      </div>
    </nav>

    <div class="topbar__actions">
      <button class="btn btn--ghost" id="btn-upload" title="Upload .md file">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload</span>
      </button>
      <input type="file" id="file-input" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden />

      <div class="dropdown" data-dropdown="examples">
        <button class="btn btn--ghost dropdown__trigger" aria-haspopup="true" aria-expanded="false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Examples</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="dropdown__caret"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dropdown__menu" id="examples-menu" role="menu">
          <!-- Populated by app.js -->
        </div>
      </div>

      <button class="btn btn--ghost btn--icon" id="btn-focus" aria-label="Toggle focus mode" title="Focus mode (Ctrl/Cmd + .)">
        <svg class="icon-focus-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        <svg class="icon-focus-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
      </button>

      <button class="btn btn--ghost btn--icon" id="btn-theme" aria-label="Toggle theme" title="Toggle theme (Ctrl/Cmd + K)">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>

      <div class="dropdown" data-dropdown="export">
        <button class="btn btn--primary dropdown__trigger" aria-haspopup="true" aria-expanded="false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Export</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="dropdown__caret"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dropdown__menu" role="menu">
          <button class="dropdown__item" data-action="export-html" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <div><strong>Download HTML</strong><small>Self-contained, offline</small></div>
          </button>
          <button class="dropdown__item" data-action="export-md" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
            <div><strong>Download Markdown</strong><small>Source .md file</small></div>
          </button>
          <button class="dropdown__item" data-action="export-pdf" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15h6M9 11h6"/></svg>
            <div><strong>Download PDF</strong><small>Light theme, direct download</small></div>
          </button>
          <div class="dropdown__divider"></div>
          <button class="dropdown__item" data-action="copy-html" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <div><strong>Copy rendered HTML</strong><small>To clipboard</small></div>
          </button>
          <button class="dropdown__item" data-action="copy-md" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <div><strong>Copy markdown source</strong><small>To clipboard</small></div>
          </button>
          <button class="dropdown__item" data-action="clear" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            <div><strong>Clear document</strong><small>Start fresh</small></div>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main workspace -->
  <main class="workspace" data-view="split">
    <!-- Editor pane -->
    <section class="pane pane--editor" aria-label="Markdown editor">
      <div class="pane__header">
        <div class="pane__tabs">
          <span class="pane__tab is-active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Source
          </span>
        </div>
        <div class="pane__meta" id="editor-meta">
          <button
            class="btn btn--ghost btn--mini pane__toggle"
            id="btn-sync"
            type="button"
            aria-pressed="true"
            title="Scroll sync — editor ↔ preview stay aligned as you scroll"
          >
            <svg class="pane__toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
            <span class="pane__toggle-label">Sync</span>
          </button>
          <span title="Paste markdown or drag-and-drop a .md file">Markdown</span>
        </div>
      </div>
      <div class="editor__wrap">
        <div class="editor__gutter" id="editor-gutter" aria-hidden="true"></div>
        <div class="editor__surface">
          <textarea
            id="editor"
            class="editor"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            wrap="soft"
            placeholder="# Start typing…&#10;&#10;Paste any markdown here, drag-and-drop a .md file, or load an example from the top bar."
          ></textarea>
          <div class="editor__mirror" id="editor-mirror" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <!-- Resize handle -->
    <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" tabindex="0" aria-label="Resize panes"></div>

    <!-- Preview pane -->
    <section class="pane pane--preview" aria-label="Rendered preview">
      <div class="pane__header">
        <div class="pane__tabs">
          <span class="pane__tab is-active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Preview
          </span>
        </div>
        <div class="pane__meta">
          <button
            class="btn btn--ghost btn--mini pane__toggle"
            id="btn-toc"
            type="button"
            aria-pressed="true"
            aria-controls="toc"
            title="Outline — table of contents (Ctrl/Cmd + L)"
          >
            <svg class="pane__toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/>
              <circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/>
              <circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/>
            </svg>
            <span class="pane__toggle-label">Outline</span>
          </button>
          <label class="switch" title="Reading-focused typography">
            <input type="checkbox" id="toggle-prose" />
            <span class="switch__track"><span class="switch__thumb"></span></span>
            <span class="switch__label">Reading mode</span>
          </label>
        </div>
      </div>
      <div class="preview__layout">
        <div class="preview__wrap" id="preview-wrap">
          <article class="preview markdown-body" id="preview" aria-live="polite"></article>
        </div>
        <aside class="toc" id="toc" aria-label="Table of contents" data-empty="true">
          <div class="toc__header">
            <span class="toc__title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/>
              </svg>
              On this page
            </span>
            <button class="toc__close" id="btn-toc-close" type="button" aria-label="Hide outline" title="Hide outline">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <nav class="toc__nav" id="toc-nav" aria-label="Document outline"></nav>
        </aside>
      </div>
    </section>
  </main>

  <!-- Status bar -->
  <footer class="statusbar" role="contentinfo">
    <div class="statusbar__group">
      <span class="status-dot" id="status-dot" data-status="ready" aria-hidden="true"></span>
      <span id="status-text">Ready</span>
    </div>
    <div class="statusbar__group statusbar__group--center">
      <span class="stat" title="Words"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg><span id="stat-words">0</span> words</span>
      <span class="stat" title="Characters"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg><span id="stat-chars">0</span> chars</span>
      <span class="stat" title="Lines"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg><span id="stat-lines">0</span> lines</span>
      <span class="stat" title="Estimated reading time"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="stat-read">0 min read</span></span>
    </div>
    <div class="statusbar__group">
      <span class="stat stat--mono" title="Last render time"><span id="stat-render">—</span></span>
      <button class="stat stat--btn" id="btn-shortcuts" type="button" title="Keyboard shortcuts (?)" aria-label="Show keyboard shortcuts">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M7 10h0M11 10h0M15 10h0M7 14h10"/></svg>
        Shortcuts
      </button>
      <a class="stat stat--link" href="https://github.com/invincible04/MarkdownLab" target="_blank" rel="noopener" id="repo-link" title="View source on GitHub">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.17c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.21.09 1.85 1.24 1.85 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58C20.57 21.79 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Source
      </a>
    </div>
  </footer>

  <!-- Drag-and-drop overlay -->
  <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
    <div class="drop-overlay__card">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <h2>Drop your markdown file</h2>
      <p>.md, .markdown, or .txt — rendered instantly</p>
    </div>
  </div>

  <!-- Floating exit-focus control (only visible in focus mode) -->
  <button class="focus-exit" id="btn-focus-exit" aria-label="Exit focus mode" title="Exit focus mode (Esc)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
    <span>Exit focus</span>
  </button>

  <!-- Diagram lightbox / zoom viewer -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Diagram viewer">
    <div class="lightbox__toolbar" role="toolbar" aria-label="Diagram controls">
      <button class="lightbox__btn" data-zoom="out" aria-label="Zoom out" title="Zoom out (−)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="lightbox__zoom" id="lightbox-zoom">100%</span>
      <button class="lightbox__btn" data-zoom="in" aria-label="Zoom in" title="Zoom in (+)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="lightbox__btn" data-zoom="reset" aria-label="Reset zoom" title="Fit to screen (0)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.64-6.36"/><polyline points="3 4 3 10 9 10"/></svg>
      </button>
      <span class="lightbox__sep"></span>
      <button class="lightbox__btn" id="lightbox-download" aria-label="Download PNG" title="Download PNG (2× resolution)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="lightbox__btn lightbox__btn--close" id="lightbox-close" aria-label="Close viewer" title="Close (Esc)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="lightbox__stage" id="lightbox-stage">
      <div class="lightbox__canvas" id="lightbox-canvas"></div>
    </div>
    <div class="lightbox__hint">Drag to pan · scroll to zoom · double-click to reset</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.10.0/highlight.min.js"></script>
